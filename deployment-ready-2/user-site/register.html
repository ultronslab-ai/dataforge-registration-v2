<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataForge | Register</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/public.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-container">
      <a href="index.html" class="logo">
        <img src="assets/dataforge-logo.png" alt="DataForge" class="logo-img">
      </a>
    </div>
  </header>

  <main class="container animate-fade-in">
    <div class="registration-container glass-panel">
      <div class="form-section">
        <h2 id="event-title-display">Loading Event...</h2>
        <p id="event-desc-display" class="mb-2 text-muted"></p>
        
        <form id="registration-form">
          <input type="hidden" id="event-id" name="eventId">
          
          <div class="form-section glass-panel mb-2">
            <h3>Team Details & Captain</h3>
            <div class="grid-2-col">
              <div class="form-group" style="grid-column: span 2;">
                <label>Team Name</label>
                <input type="text" name="teamName" required placeholder="Cyber Knights">
              </div>
              <div class="form-group">
                <label>Full Name (Captain)</label>
                <input type="text" name="captainName" required placeholder="Jane Doe">
              </div>
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="captainEmail" required placeholder="jane@example.com">
              </div>
              <div class="form-group">
                <label>Registration Number (Optional)</label>
                <input type="text" name="captainRegNo" placeholder="RA2311003010001">
              </div>
              <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="captainPhone" required placeholder="+1 234 567 890">
              </div>
              <div class="form-group">
                <label>Institute Name and Dept</label>
                <input type="text" name="captainOrg" required placeholder="SRM Institute of Science and Technology - CSE">
              </div>
            </div>
            
            <div class="form-group file-upload" id="resume-upload-group">
              <label>Upload Resume / Student ID (PDF)</label>
              <input type="file" name="captainFile" accept=".pdf" required>
            </div>
          </div>
          
          <div id="team-members-container" class="form-section glass-panel mb-2" style="display:none;">
            <h3>Team Members</h3>
            <div id="members-list"></div>
            <button type="button" id="add-member-btn" class="btn"> + Add Team Member </button>
            <p class="text-muted mt-2" style="font-size: 0.8rem;">Max team size: <span id="max-team-display">4</span></p>
          </div>
          
          <div id="payment-section" class="form-section glass-panel mb-2" style="display:none;">
            <h3>Payment Details</h3>
            <div class="summary-box">
              <div class="summary-row">
                <span>Base Ticket Price:</span>
                <span id="base-price">INR 0</span>
              </div>
              <div class="summary-row" id="team-cost-row">
                <span>Additional Members (<span id="member-count-display">0</span>):</span>
                <span id="member-cost">INR 0</span>
              </div>
              <div class="summary-total">
                <span>Total Due:</span>
                <span id="total-price">INR 0</span>
              </div>
            </div>
            <!-- UPI QR and details -->
            <div class="payment-instructions mb-2">
              <p id="payment-note-display" class="mb-1" style="color: var(--accent-green)"></p>
              <div class="qr-container text-center mb-1">
                <img id="qr-code-img" src="" alt="Payment QR Code" style="max-width: 200px; border: 2px solid var(--accent-green); border-radius: 8px; display: none;">
              </div>
              <p class="text-center" id="upi-container" style="display: none;">UPI ID: <strong id="upi-id-display" style="color: var(--accent-blue)"></strong></p>
            </div>
            <div class="grid-2-col">
              <div class="form-group">
                <label>Transaction ID / UPI Ref</label>
                <input type="text" name="transaction_id" id="transaction-id" placeholder="TXN12345678">
              </div>
              <div class="form-group file-upload">
                <label>Upload Payment Proof (Image/PDF)</label>
                <input type="file" name="payment_proof" id="payment-proof-file" accept="image/*,.pdf">
              </div>
            </div>
          </div>
          
          <div class="text-center mt-2">
            <button type="submit" class="btn btn-primary" id="submit-btn">Complete Registration</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="js/matrix-bg.js" defer></script>
  <script type="module" src="js/register.js?v=20260529-institute-dept"></script>
</body>
</html>
